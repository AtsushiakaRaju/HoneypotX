<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin Portal — SecureNet Systems</title>
    <style>
        /* Looks like a real corporate admin panel */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0f1117;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            color: #e2e8f0;
        }

        .bg-pattern {
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0, 255, 136, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 136, 0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
        }

        .login-box {
            background: #1a1d27;
            border: 1px solid #2d3748;
            border-radius: 12px;
            padding: 48px 40px;
            width: 420px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
            position: relative;
            z-index: 1;
        }

        .logo-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 32px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #00ff88, #00b4d8);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .logo-sub {
            font-size: 11px;
            color: #64748b;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        h2 {
            font-size: 22px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 6px;
        }

        .subtitle {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 28px;
        }

        label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="password"] {
            width: 100%;
            background: #0f1117;
            border: 1px solid #2d3748;
            border-radius: 8px;
            padding: 12px 16px;
            font-size: 14px;
            color: #e2e8f0;
            margin-bottom: 20px;
            transition: border-color 0.2s;
            outline: none;
        }

        input:focus {
            border-color: #00ff88;
            box-shadow: 0 0 0 3px rgba(0, 255, 136, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #00ff88, #00b4d8);
            color: #0f1117;
            font-weight: 700;
            font-size: 14px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            letter-spacing: 0.5px;
            transition: opacity 0.2s;
        }

        .btn-login:hover {
            opacity: 0.9;
        }

        .error-box {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-note {
            text-align: center;
            font-size: 11px;
            color: #374151;
            margin-top: 24px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #00ff88;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }
        }
    </style>
</head>

<body>
    <div class="bg-pattern"></div>
    <div class="login-box">
        <div class="logo-row">
            <div class="logo-icon">🔐</div>
            <div>
                <div class="logo-text">SecureNet Systems</div>
                <div class="logo-sub">Enterprise Admin Portal</div>
            </div>
        </div>

        <h2>Sign in</h2>
        <p class="subtitle">Authorized personnel only. All access is monitored.</p>

        {% if error %}
        <div class="error-box">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/admin">
            <label>Username</label>
            <input type="text" name="username" placeholder="Enter your username" autocomplete="off" />

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter your password" />

            <button type="submit" class="btn-login">AUTHENTICATE →</button>
        </form>

        <div class="footer-note">
            <span class="status-dot"></span>
            System online · SecureNet v4.2.1 · All sessions logged
        </div>
    </div>
</body>

</html>
